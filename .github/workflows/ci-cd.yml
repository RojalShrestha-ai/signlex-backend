# SignLex Backend - CI/CD Pipeline
# Author: Amin Memon
#
# Workflow:
#   1. On every push/PR: lint + run unit & integration tests
#   2. On push to 'develop': deploy to staging
#   3. On push to 'main': deploy to production
#
# Requires these GitHub Secrets:
#   MONGODB_URI_STAGING, MONGODB_URI_PRODUCTION
#   FIREBASE_PROJECT_ID, FIREBASE_CLIENT_EMAIL, FIREBASE_PRIVATE_KEY
#   DEPLOY_HOST_STAGING, DEPLOY_HOST_PRODUCTION
#   DEPLOY_USER, DEPLOY_SSH_KEY

name: SignLex Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────
  # Job 1: Lint & Test
  # ────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --coverage --forceExit
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/signlex-test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ────────────────────────────────────────────────
  # Job 2: Deploy to Staging (develop branch)
  # ────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST_STAGING }} >> ~/.ssh/known_hosts

      - name: Deploy to staging server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST_STAGING }} << 'DEPLOY_SCRIPT'
            set -e
            cd /opt/signlex-backend

            echo "==> Pulling latest code..."
            git fetch origin develop
            git reset --hard origin/develop

            echo "==> Installing dependencies..."
            npm ci --production

            echo "==> Restarting application..."
            pm2 restart signlex-staging || pm2 start src/server.js --name signlex-staging

            echo "==> Health check..."
            sleep 3
            curl -sf http://localhost:5000/api/health || (echo "Health check failed!" && exit 1)

            echo "==> Staging deployment complete!"
          DEPLOY_SCRIPT

      - name: Notify deployment status
        if: always()
        run: echo "Staging deployment ${{ job.status }}"

  # ────────────────────────────────────────────────
  # Job 3: Deploy to Production (main branch)
  # ────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST_PRODUCTION }} >> ~/.ssh/known_hosts

      - name: Deploy to production server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST_PRODUCTION }} << 'DEPLOY_SCRIPT'
            set -e
            cd /opt/signlex-backend

            echo "==> Pulling latest release..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Installing dependencies..."
            npm ci --production

            echo "==> Restarting application (zero-downtime)..."
            pm2 reload signlex-production || pm2 start src/server.js --name signlex-production -i max

            echo "==> Health check..."
            sleep 5
            curl -sf http://localhost:5000/api/health || (echo "Health check failed! Rolling back..." && pm2 restart signlex-production && exit 1)

            echo "==> Production deployment complete!"
          DEPLOY_SCRIPT

      - name: Notify deployment status
        if: always()
        run: echo "Production deployment ${{ job.status }}"
