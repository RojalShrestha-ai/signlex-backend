# SignLex Backend - Docker Compose
# Author: Amin Memon
#
# Local development stack with MongoDB.
# Usage: docker compose up -d

services:
  api:
    build: .
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/signlex
      - NODE_ENV=development
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - signlex-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  signlex-mongo-data:
